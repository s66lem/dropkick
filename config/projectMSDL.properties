# Dropkick frontend configuration (Poco properties format).
# Paths may use ${env.HOME}.

window.fullscreen = true
projectM.presetPath = ${env.HOME}/.local/share/dropkick/presets/cream-of-the-crop
projectM.texturePath = ${env.HOME}/.local/share/dropkick/textures
projectM.shuffleEnabled = true
projectM.presetLocked = false

# Audio: leave empty to use the default/first capture device, or set a
# device name/index as listed by the frontend's --listAudioDevices output.
audio.device =

# Phone remote control
remote.port = 8080
remote.token =
remote.presetRoot = ${env.HOME}/.local/share/dropkick/presets
remote.webRoot = ${env.HOME}/.local/share/dropkick/remote
